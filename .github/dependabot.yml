version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 14

  - package-ecosystem: "nuget"
    directory: "/"
    registries: '*'
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
